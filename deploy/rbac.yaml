apiVersion: v1
kind: ServiceAccount
metadata:
  name: drf-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: drf-scheduler-kube-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # Стандартная роль kube-scheduler (нужна для list/watch множества ресурсов и bind).
  name: system:kube-scheduler
subjects:
  - kind: ServiceAccount
    name: drf-scheduler
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: drf-scheduler-extra
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: drf-scheduler-extra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: drf-scheduler-extra
subjects:
  - kind: ServiceAccount
    name: drf-scheduler
    namespace: kube-system
