# Профиль планировщика с DRF. Запуск:
#   kube-scheduler --config=config/scheduler-config.yaml --kubeconfig=...
# Поды должны иметь spec.schedulerName: drf-scheduler (или задать DRF_SCHEDULER_NAME под ваше имя).
apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
# Ускорение повторных попыток планирования после Unschedulable (см. deploy/scheduler-deployment.yaml).
podInitialBackoffSeconds: 1
podMaxBackoffSeconds: 1
profiles:
  - schedulerName: drf-scheduler
    plugins:
      preFilter:
        enabled:
          - name: DRFPlugin
      filter:
        enabled:
          - name: DRFPlugin
      score:
        enabled:
          - name: DRFPlugin
            weight: 50
      reserve:
        enabled:
          - name: DRFPlugin
