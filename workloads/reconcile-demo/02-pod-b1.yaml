# Beta: высокая доля по CPU.
apiVersion: v1
kind: Pod
metadata:
  name: drf-demo-b1
  namespace: drf-reconcile-demo
  labels:
    user: beta
spec:
  schedulerName: drf-scheduler
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.9
      resources:
        requests:
          cpu: 1200m
          memory: 128Mi
